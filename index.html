<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Sheet-Tee Master</title>
    
    <script src="config.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* 3. YOUR PREMIUM CSS - Controlled by CONFIG */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #1a4a2e; /* Your Signature Green */
            font-family: Georgia, serif; 
            color: #f0ead6; 
            overflow-x: hidden;
            line-height: 1.4;
        }
        .gold-text { color: #d4af37; }
        .btn-primary { 
            background: #d4af37; 
            color: #1a4a2e; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
        }
        .input-gate {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212,175,55,0.3);
            padding: 15px;
            color: #f0ead6;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 15px;
            text-align: center;
            font-size: 18px;
        }
        /* Tab Navigation styling from your original design */
        .nav-bar { display: flex; background: rgba(0,0,0,0.2); border-bottom: 1px solid #d4af37; }
        .nav-item { flex: 1; padding: 15px 5px; text-align: center; font-size: 11px; text-transform: uppercase; color: rgba(240,234,214,0.5); cursor: pointer; }
        .nav-item.active { color: #d4af37; border-bottom: 2px solid #d4af37; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createClient } = supabase;

        // Initialize Database using CONFIG variables
        const sb = createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);

        /* --- COMPONENT: PASSWORD GATE --- */
        function AuthGate({ onEntry }) {
            const [pass, setPass] = useState("");
            const check = () => {
                if(pass.toLowerCase() === CONFIG.groupPassword.toLowerCase()) {
                    localStorage.setItem("st_auth", "true");
                    onEntry();
                } else { alert("Access Denied"); }
            };
            return (
                <div style={{height:'100vh', display:'flex', flexDirection:'column', justifyContent:'center', padding:40, textAlign:'center'}}>
                    <img src={CONFIG.logoUrl} style={{width:120, margin:'0 auto 20px', display:'block'}} />
                    <h1 style={{fontSize:28, marginBottom:10}}>{CONFIG.clubName}</h1>
                    <p className="gold-text" style={{fontSize:12, letterSpacing:2, marginBottom:30}}>{CONFIG.tagline}</p>
                    <input type="password" placeholder="Entry Password" className="input-gate" onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&check()} />
                    <button className="btn-primary" onClick={check}>Enter Clubhouse</button>
                </div>
            );
        }

        /* --- MAIN APP ENGINE --- */
        function SheetTeeApp() {
            const [isAuth, setIsAuth] = useState(localStorage.getItem("st_auth") === "true");
            const [view, setView] = useState("signup");

            if (!isAuth) return <AuthGate onEntry={() => setIsAuth(true)} />;

            return (
                <div style={{maxWidth:500, margin:'0 auto', minHeight:'100vh', display:'flex', flexDirection:'column'}}>
                    <header style={{padding:20, textAlign:'center', borderBottom:'1px solid rgba(212,175,55,0.2)'}}>
                        <img src={CONFIG.logoUrl} style={{width:60}} />
                        <h2 style={{fontSize:20, marginTop:10}}>{CONFIG.clubName}</h2>
                    </header>

                    <nav className="nav-bar">
                        <div className={`nav-item ${view==='signup'?'active':''}`} onClick={()=>setView('signup')}>Sign Up</div>
                        <div className={`nav-item ${view==='tally'?'active':''}`} onClick={()=>setView('tally')}>Who's In</div>
                        {CONFIG.enablePlayaClub && <div className={`nav-item ${view==='playa'?'active':''}`} onClick={()=>setView('playa')}>Playa Club</div>}
                    </nav>

                    <main style={{flex:1, padding:20}}>
                        {/* THE HEART: This is where your original shuffler/signup logic goes */}
                        {view === 'signup' && (
                            <div>
                                <h3 className="gold-text" style={{fontSize:12, letterSpacing:2, marginBottom:20, textAlign:'center'}}>WEEKEND ROSTER</h3>
                                <div style={{background:'rgba(255,255,255,0.03)', borderRadius:12, padding:20, textAlign:'center', border:'1px solid rgba(255,255,255,0.05)'}}>
                                    <p style={{opacity:0.6}}>The engine is ready. Roster for {CONFIG.clubName} is active.</p>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 2026 INSTALL BUTTON */}
                    <button id="pwa-btn" style={{position:'fixed', bottom:20, right:20, background:'#d4af37', border:'none', width:50, height:50, borderRadius:'50%', fontSize:20, boxShadow:'0 4px 15px rgba(0,0,0,0.4)', cursor:'pointer'}}>📲</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<SheetTeeApp />);
    </script>
</body>
</html>
